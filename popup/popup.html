<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DomainGuard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 220px;
      padding: 12px;
      background: #f8f9fa;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 10px;
      text-align: center;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      color: #1a1a1a;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      text-align: center;
    }

    .btn:last-child {
      margin-bottom: 0;
    }

    .btn:hover {
      background: #e8e8e8;
      border-color: #aaa;
    }

    .btn:active {
      background: #ddd;
    }
  </style>
</head>
<body>
  <h1>DomainGuard</h1>
  <button class="btn" id="btn-sidebar">Open Sidebar</button>
  <button class="btn" id="btn-window">Open Detached Window</button>
  <script src="popup.js"></script>
</body>
</html>
